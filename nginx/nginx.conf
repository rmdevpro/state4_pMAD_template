# Context Broker — Nginx gateway configuration
# Pure routing layer. No application logic.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;

    # Upstream: LangGraph application container
    upstream context_broker_langgraph {
        server context-broker-langgraph:8000;
    }

    server {
        listen 8080;
        server_name _;
        server_tokens off;

        # Increase timeouts for long-running LLM operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # Health check endpoint
        location /health {
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header X-XSS-Protection "1; mode=block" always;
            proxy_pass http://context_broker_langgraph;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # MCP endpoint — HTTP/SSE transport
        location /mcp {
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header X-XSS-Protection "1; mode=block" always;
            proxy_pass http://context_broker_langgraph;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE requires these headers
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # OpenAI-compatible chat endpoint
        location /v1/chat/completions {
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header X-XSS-Protection "1; mode=block" always;
            proxy_pass http://context_broker_langgraph;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE streaming support
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # Gradio Chat UI (proxied, not directly published)
        # Uses resolver + variable so nginx starts even when UI container is absent.
        # Rewrite strips /ui/ prefix before forwarding to the UI container.
        location /ui/ {
            resolver 127.0.0.11 valid=30s;
            set $ui_upstream http://context-broker-ui:7860;
            rewrite ^/ui/(.*)$ /$1 break;
            proxy_pass $ui_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Prometheus metrics endpoint
        location /metrics {
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header X-XSS-Protection "1; mode=block" always;
            proxy_pass http://context_broker_langgraph;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}

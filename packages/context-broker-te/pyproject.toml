[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "context-broker-te"
version = "0.1.0"
description = "Context Broker Thought Engine — Imperator cognitive agent"
requires-python = ">=3.12"
# Framework dependencies only. Host kernel provides asyncpg, redis,
# prometheus-client, httpx, etc. via the runtime environment.
dependencies = [
    "langgraph>=0.2.60",
    "langchain-core>=0.3.28",
    "langchain-openai>=0.2.14",
]

[project.entry-points."context_broker.te"]
context-broker-te = "context_broker_te.register:register"

[tool.setuptools.packages.find]
where = ["src"]

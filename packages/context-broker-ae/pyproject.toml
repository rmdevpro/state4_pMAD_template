[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "context-broker-ae"
version = "0.1.0"
description = "Context Broker Action Engine — infrastructure StateGraphs"
requires-python = ">=3.12"
# Framework dependencies only. Host kernel provides asyncpg, redis,
# prometheus-client, httpx, mem0ai, etc. via the runtime environment.
dependencies = [
    "langgraph>=0.2.60",
    "langchain-core>=0.3.28",
    "langchain-openai>=0.2.14",
]

[project.entry-points."context_broker.ae"]
context-broker-ae = "context_broker_ae.register:register"

[tool.setuptools.packages.find]
where = ["src"]
